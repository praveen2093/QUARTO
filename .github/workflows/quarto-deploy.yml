name: Publish Quarto Website

on:
  push:
    branches:
      - main

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Quarto (manual)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget jq
          echo "Fetching latest Quarto release..."
          TAG=$(curl -sS https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest | jq -r .tag_name)
          echo "Latest release: $TAG"
          ARCH=linux-amd64
          ASSET_URL=$(curl -sS https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest | jq -r --arg arch "$ARCH" '.assets[] | select(.name | test($arch + ".*\\.deb")) | .browser_download_url')
          if [ -z "$ASSET_URL" ]; then
            echo "No .deb asset found for ${ARCH}, attempting tarball fallback..."
            ASSET_URL=$(curl -sS https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest | jq -r --arg arch "$ARCH" '.assets[] | select(.name | test($arch + ".*\\.(tar.gz|tgz)")) | .browser_download_url')
          fi
          echo "Downloading $ASSET_URL"
          wget -q "$ASSET_URL" -O /tmp/quarto_asset
          if file /tmp/quarto_asset | grep -q deb; then
            sudo apt-get install -y /tmp/quarto_asset
          else
            tar -xzf /tmp/quarto_asset -C /tmp
            sudo cp /tmp/quarto*/bin/quarto /usr/local/bin/
          fi
          quarto --version

      - name: Render Quarto website
        run: quarto render

      - name: Commit generated docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Build Quarto site to docs [skip ci]"
          file_pattern: docs
          branch: main
          push: true
